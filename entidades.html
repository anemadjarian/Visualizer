<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizer</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/entidades.css" />
</head>

<body>

    <header>
        <a href="./index.html" class="logo">

            <img src="img/logo.svg" alt="Visualizer" class="logo-img">

            <div class="logo-text">
                VISUAL<span class="accent-1">I</span><span class="accent-2">Z</span><span class="accent-3">ER</span>
            </div>
        </a>

        <nav>
            <a href="dados.html" class="nav-item" data-view="dados">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <ellipse cx="12" cy="5" rx="8" ry="3" />
                    <path d="M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5" />
                    <path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3" />
                </svg>
                Dados
            </a>

            <a href="index.html" class="nav-item" data-view="inicio">
    <svg viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round">
        <path d="M3 10.5L12 3l9 7.5"/>
        <path d="M5 9.5V21h14V9.5"/>
        <path d="M9 21v-6h6v6"/>
    </svg>
    Início
</a>

            <a href="tutorial.html" class="nav-item" data-view="tutorial">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.5 9a2.5 2.5 0 0 1 4.86 1c0 1.5-2.36 2-2.36 3.5" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                Tutorial
            </a>

        </nav>
    </header>

    <main>
        <div class="header-division">
            <h2 class="panel-title">Entidades</h2>

            <button class="default-btn" id="open-entity-modal" type="button">
                Criar entidade
            </button>
        </div>
        <hr class="divider" />

        <ul class="entity-list" id="entity-list"></ul>
    </main>

    <div class="back-modal" id="entity-modal" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="entity-modal-title">

            <div class="modal-header">
                <h1 id="entity-modal-title">Criar Entidade</h1>

                <button class="modal-close" id="close-entity-modal" type="button" aria-label="Fechar">
                    <span class="material-symbols-outlined">
                        close
                    </span>
                </button>
            </div>

            <div class="modal-body">
                <div class="form-message" id="entity-form-message" aria-live="polite"></div>

                <div class="form-group">
                    <label for="entity-name">Nome</label>

                    <input type="text" class="modal-input" id="entity-name" placeholder="Pessoa, Curso, Animal ...">
                    <span class="field-error" id="entity-name-error"></span>
                </div>

                <div class="form-group">
                    <label for="attribute-name">Atributos</label>

                    <div class="attribute-box">

                        <div class="attribute-create">

                            <div class="attribute-name-group">
                                <input type="text" class="attribute-name" id="attribute-name"
                                    placeholder="Digite aqui ...">
                                <span class="field-error" id="attribute-name-error"></span>
                            </div>

                            <select class="attribute-type" id="attribute-type">
                                <option value="String">String</option>
                                <option value="Integer">Integer</option>
                                <option value="Float">Float</option>
                                <option value="Boolean">Boolean</option>
                            </select>

                            <button class="attribute-add" id="attribute-add" type="button">
                                Criar
                            </button>

                        </div>

                        <ul class="attribute-list" id="attribute-list"></ul>

                    </div>
                </div>

            </div>

            <div class="modal-footer">
                <button class="default-btn" id="save-entity" type="button">
                    Criar entidade
                </button>
            </div>

        </div>
    </div>


    <div class="back-modal" id="entity-info-modal" aria-hidden="true">
        <div class="modal info-modal" role="dialog" aria-modal="true" aria-labelledby="entity-info-title">

            <div class="modal-header">
                <div>
                    <h1 id="entity-info-title">Informacoes da Entidade</h1>
                    <p class="modal-subtitle" id="entity-info-subtitle"></p>
                </div>

                <button class="modal-close" id="close-info-modal" type="button" aria-label="Fechar">
                    <span class="material-symbols-outlined">
                        close
                    </span>
                </button>
            </div>

            <div class="info-grid" id="entity-info-grid"></div>

            <div class="info-section">
                <div class="info-section-header">
                    <h2>Atributos</h2>
                </div>
                <ul class="info-attribute-list" id="entity-info-attributes"></ul>
            </div>

            <div class="info-section">
                <div class="info-section-header">
                    <h2>Arquivo simulado</h2>
                    <span id="entity-info-file-key"></span>
                </div>
                <div class="byte-preview" id="entity-info-bytes"></div>
            </div>

        </div>
    </div>

    <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
    
    <script src="js/ByteStream.js"></script>
    <script src="js/VetorBytesEntidade.js"></script>
    <script src="js/Entidade.js"></script>
    <script src="js/EntidadeStorage.js"></script>
    <script src="js/entidadesPage.js"></script>
</body>

</html>
